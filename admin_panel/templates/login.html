<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Docura Admin — Вход</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4F8;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:40px;width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:24px;font-weight:800;color:#1A2E5A}
.logo span{font-size:13px;color:#718096}
label{display:block;font-size:12px;font-weight:600;color:#4a5568;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px}
input{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:14px;outline:none;transition:border 0.15s}
input:focus{border-color:#2E75B6;box-shadow:0 0 0 3px rgba(46,117,182,0.1)}
.btn{width:100%;padding:11px;background:#1A2E5A;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.15s}
.btn:hover{background:#243d75}
.error{background:#fff5f5;color:#c53030;border:1px solid #fed7d7;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Docura.kz</h1>
    <span>Панель администратора</span>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Логин</label>
    <input type="text" name="login" placeholder="Unicorn" autofocus>
    <label>Пароль</label>
    <input type="password" name="password" placeholder="••••••••">
    <button class="btn" type="submit">Войти</button>
  </form>
</div>
</body>
</html>
