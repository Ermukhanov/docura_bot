<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Docura</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>
:root{--bg:#f6f6fa;--card:#fff;--ink:#1b1b27;--muted:#858594;--violet:#5b54e8;--dark:#20202e;--line:#ededf3}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 100% 0,#e6e3ff,transparent 34%),var(--bg);font:15px Inter,system-ui;color:var(--ink)}button{font:inherit;cursor:pointer;border:0}main{max-width:980px;margin:auto;padding:18px 18px 100px}.top{display:flex;align-items:center;justify-content:space-between;margin:5px 0 26px}.logo{font-size:24px;font-weight:900;letter-spacing:-1px}.logo i{color:var(--violet);font-style:normal}.avatar{width:45px;height:45px;border-radius:15px;background:var(--dark);color:#fff;display:grid;place-items:center;font-weight:800}.hero{border-radius:29px;padding:27px;color:#fff;background:linear-gradient(135deg,#1d1d2b,#665de8);box-shadow:0 22px 55px #3832a830}.hero small{color:#cfccff;text-transform:uppercase;letter-spacing:2px;font-size:11px}.hero h1{font-size:39px;line-height:.98;letter-spacing:-2.5px;margin:12px 0}.hero p{color:#deddf6;line-height:1.5;max-width:510px}.primary{background:#fff;color:#2b276c;border-radius:13px;padding:13px 17px;font-weight:850}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-top:16px}.card{background:var(--card);border-radius:21px;padding:18px;box-shadow:0 12px 35px #34316c0d}.card strong{display:block;font-size:25px;margin:10px 0 3px}.muted{color:var(--muted);font-size:13px}.section{margin-top:28px}.section h2{font-size:19px;letter-spacing:-.5px;margin:0 0 12px}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.action{display:flex;align-items:center;gap:11px;text-align:left;background:#fff;border-radius:18px;padding:15px;font-weight:750;color:var(--ink)}.icon{width:39px;height:39px;border-radius:13px;display:grid;place-items:center;background:#e2f8ed;font-size:19px}.action:nth-child(2) .icon{background:#fff0c8}.action:nth-child(3) .icon{background:#e6e3ff}.action:nth-child(4) .icon{background:#ffe1e9}.promo{display:flex;align-items:center;justify-content:space-between;gap:15px;background:#20202e;color:#fff;border-radius:22px;padding:18px}.promo b{display:block;margin-bottom:5px}.promo small{color:#c7c5dd}.promo button{background:#d9d5ff;color:#292368;border-radius:11px;padding:10px 12px;font-weight:800}.row{display:flex;gap:12px;align-items:center;padding:13px 0;border-bottom:1px solid var(--line)}.row:last-child{border:0}.rowicon{width:37px;height:37px;border-radius:11px;background:#f0f0f7;display:grid;place-items:center}.row b{display:block;font-size:14px}.row small{color:var(--muted);display:block;margin-top:3px}.panel{display:none}.panel.active{display:block}.back{background:none;color:var(--violet);font-weight:800;padding:0;margin-bottom:17px}.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(980px,100%);display:grid;grid-template-columns:repeat(4,1fr);padding:10px 18px 14px;background:#f6f6fae8;backdrop-filter:blur(15px)}.tabs button{background:none;color:var(--muted);font-size:11px;padding:5px}.tabs button.active{color:var(--violet);font-weight:850}.loading{text-align:center;padding:70px;color:var(--muted)}@media(max-width:650px){.grid{grid-template-columns:repeat(2,1fr)}.grid .card:last-child{grid-column:span 2}.actions{grid-template-columns:repeat(2,1fr)}.promo{align-items:flex-start}.promo button{white-space:nowrap}}@media(min-width:700px){.hero{padding:40px}.hero h1{font-size:52px}}
</style></head><body><main id="app"><div class="loading">Открываю Docura…</div></main><script>
const tg=window.Telegram?.WebApp;tg?.ready();tg?.expand();let data;const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
function openBot(){if(tg?.openTelegramLink)tg.openTelegramLink('https://t.me/docurakz_bot');else location.href='https://t.me/docurakz_bot'}
function layout(tab='home'){const u=data.user||{},name=esc(u.name||tg?.initDataUnsafe?.user?.first_name||'Коллега'),docs=data.documents||[];document.querySelector('#app').innerHTML=`<div class="top"><div class="logo">docura<i>.</i></div><div class="avatar">${esc(name[0])}</div></div><div id="home" class="panel ${tab==='home'?'active':''}"><section class="hero"><small>Персональный кабинет</small><h1>Привет, ${esc(name.split(' ')[0])}.</h1><p>Docura помогает учителям и воспитателям быстро создавать документы, общаться с AI-агентом и хранить всё важное в одном месте.</p><button class="primary" onclick="openBot()">＋ Создать документ в чате</button></section><div class="grid"><div class="card"><span class="muted">Документы</span><strong>${docs.length}</strong><span class="muted">последние</span></div><div class="card"><span class="muted">Приглашено</span><strong>${data.referrals||0}</strong><span class="muted">коллег</span></div><div class="card"><span class="muted">Тариф</span><strong>${u.subscribed?'PRO':'FREE'}</strong><span class="muted">Docura</span></div></div><section class="section"><div class="promo"><div><b>Первый месяц PRO выгоднее</b><small>Больше документов, голосовой ввод и AI без ограничений.</small></div><button onclick="openBot()">Подробнее</button></div></section><section class="section"><h2>Быстрый доступ</h2><div class="actions"><button class="action" onclick="panel('docs')"><span class="icon">✦</span>Документы</button><button class="action" onclick="panel('agent')"><span class="icon">◎</span>AI-агент</button><button class="action" onclick="panel('memory')"><span class="icon">◌</span>Память</button><button class="action" onclick="panel('friends')"><span class="icon">↗</span>Друзья</button></div></section></div><div id="docs" class="panel ${tab==='docs'?'active':''}"><button class="back" onclick="panel('home')">← Главная</button><h2>Мои документы</h2><div class="card">${docs.map(x=>`<div class="row"><span class="rowicon">📄</span><div><b>${esc(x.doc_name)}</b><small>${esc((x.created_at||'').slice(0,10))} · оценка ${x.score||'—'}</small></div></div>`).join('')||'<span class="muted">Документов пока нет. Создай первый в чате.</span>'}</div></div><div id="agent" class="panel ${tab==='agent'?'active':''}"><button class="back" onclick="panel('home')">← Главная</button><h2>AI-агент Docura</h2><div class="card"><strong>Напиши ему в Telegram</strong><p class="muted">Опиши задачу обычными словами — агент поможет выбрать документ, использует профиль и продолжит работу в чате.</p><button class="primary" onclick="openBot()">Открыть AI-чат</button></div></div><div id="memory" class="panel ${tab==='memory'?'active':''}"><button class="back" onclick="panel('home')">← Главная</button><h2>Память AI</h2><div class="card"><strong>${data.memory?'Память активна':'Память пока пустая'}</strong><p class="muted">Docura запоминает полезные настройки и контекст только для твоих документов.</p></div></div><div id="friends" class="panel ${tab==='friends'?'active':''}"><button class="back" onclick="panel('home')">← Главная</button><h2>Друзья и приглашения</h2><div class="card"><strong>${data.referrals||0} приглашённых коллег</strong><p class="muted">Используй существующую реферальную программу `/invite` и получай бонусные документы.</p><button class="primary" onclick="openBot()">Открыть /invite</button></div></div><div class="tabs"><button class="${tab==='home'?'active':''}" onclick="panel('home')">⌂<br>Главная</button><button class="${tab==='docs'?'active':''}" onclick="panel('docs')">▤<br>Документы</button><button class="${tab==='agent'?'active':''}" onclick="panel('agent')">✧<br>AI-агент</button><button class="${tab==='friends'?'active':''}" onclick="panel('friends')">◉<br>Профиль</button></div>`}
function panel(x){layout(x)}async function boot(){let r=await fetch('/api/me',{headers:{'X-Telegram-Init-Data':tg?.initData||''}});if(!r.ok)throw 0;data=await r.json();layout()}boot().catch(()=>document.querySelector('#app').innerHTML='<div class="loading">Откройте кабинет из Telegram</div>');
</script></body></html>
